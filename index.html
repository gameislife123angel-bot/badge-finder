<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #2a2a2a; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        h2 { margin-top: 0; color: #f0f0f0; font-size: 20px; }
        .badge-info { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #bbb; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: 2px solid #007bff; border-color: transparent; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; margin-top: 5px; }
        button:hover { background: #0056b3; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: 600; display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .owned { background: rgba(40, 167, 69, 0.2); color: #2ecc71; border: 1px solid #28a745; display: block !important; }
        .not-owned { background: rgba(220, 53, 69, 0.2); color: #e74c3c; border: 1px solid #dc3545; display: block !important; }
        .loading { color: #f1c40f; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Roblox Badge Verifier</h2>
    <div class="badge-info">Target Badge ID: <strong>2124500831</strong></div>
    
    <input type="number" id="userId" placeholder="Enter Roblox User ID (Numbers Only)" required>
    <button onclick="checkBadge()">Verify Ownership</button>
    
    <div id="result"></div>
</div>

<script>
    async function checkBadge() {
        const userId = document.getElementById('userId').value;
        const badgeId = "2124500831";
        const resultDiv = document.getElementById('result');

        if (!userId) {
            alert("Please enter a valid User ID!");
            return;
        }

        // Reset and show loading
        resultDiv.innerHTML = "🔍 Checking Roblox Inventory...";
        resultDiv.className = "loading";

        try {
            // Using RoProxy to bypass CORS restrictions
            const proxyUrl = `https://badges.roproxy.com/v1/users/${userId}/badges/${badgeId}/awarded-date`;
            
            const response = await fetch(proxyUrl);
            
            if (response.ok) {
                const data = await response.json();
                
                // If awardedDate exists, the user owns the badge
                if (data && data.awardedDate) {
                    const date = new Date(data.awardedDate).toLocaleDateString();
                    resultDiv.innerHTML = `✅ OWNED!<br><span style="font-size:12px; font-weight:normal;">Awarded on: ${date}</span>`;
                    resultDiv.className = "owned";
                } else {
                    resultDiv.innerHTML = "❌ NOT OWNED<br><span style="font-size:12px; font-weight:normal;">This badge is not in the user's inventory.</span>";
                    resultDiv.className = "not-owned";
                }
            } else if (response.status === 404) {
                resultDiv.innerHTML = "❌ Invalid User or Badge ID";
                resultDiv.className = "not-owned";
            } else {
                resultDiv.innerHTML = "⚠️ Roblox API Error<br><span style="font-size:12px; font-weight:normal;">Try again in a few minutes.</span>";
                resultDiv.className = "not-owned";
            }
        } catch (error) {
            resultDiv.innerHTML = "📡 Connection Failed<br><span style="font-size:12px; font-weight:normal;">Check your internet or the Proxy status.</span>";
            resultDiv.className = "not-owned";
        }
    }
</script>

</body>
</html>
