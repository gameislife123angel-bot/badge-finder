<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #222; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; min-height: 20px; line-height: 1.5; }
        .found { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .not-found { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .searching { color: #f1c40f; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">Badge Scanner Pro</h2>
    <p style="color: #888; font-size: 13px;">Scanning for Badge ID:<br><strong>2124500831</strong></p>
    
    <input type="number" id="userId" placeholder="Enter Roblox User ID">
    <button id="btn" onclick="deepSearch()">Start Full Scan</button>
    
    <div id="status">Ready to scan...</div>
</div>

<script>
    async function deepSearch() {
        const userId = document.getElementById('userId').value;
        const targetBadge = "2124500831";
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');

        if (!userId) { alert("Please enter a User ID"); return; }

        // UI Updates
        btn.disabled = true;
        status.className = "searching";
        status.innerHTML = "Initializing Scan...";
        
        let nextPageCursor = "";
        let found = false;
        let pagesChecked = 0;

        try {
            while (true) {
                pagesChecked++;
                status.innerHTML = `Checking page ${pagesChecked}...<br><span style="font-size:11px;">Scanning history...</span>`;
                
                const url = `https://badges.roproxy.com/v1/users/${userId}/badges?limit=100&sortOrder=Desc&cursor=${nextPageCursor}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data || !data.data) break;

                // Check this page for the badge
                found = data.data.some(badge => badge.id.toString() === targetBadge);
                
                if (found) break;

                // Move to next page or stop if no more badges
                nextPageCursor = data.nextPageCursor;
                if (!nextPageCursor) break; 
                
                // Small delay to prevent rate-limiting
                await new Promise(r => setTimeout(r, 200)); 
            }

            if (found) {
                status.className = "found";
                status.innerHTML = "✅ BADGE FOUND!<br><span style='font-weight:normal; font-size:12px;'>Verified in user's full history.</span>";
            } else {
                status.className = "not-found";
                status.innerHTML = "❌ NOT FOUND<br><span style='font-weight:normal; font-size:11px;'>Checked all pages. Ensure inventory is Public.</span>";
            }

        } catch (error) {
            status.className = "not-found";
            status.innerHTML = "⚠️ Error: Proxy Connection Failed";
        }

        btn.disabled = false;
    }
</script>

</body>
</html>
