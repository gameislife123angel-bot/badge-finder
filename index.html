<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid #333; max-width: 350px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; }
        button { width: 95%; padding: 12px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; min-height: 40px; }
        .loading { color: #f1c40f; border: 1px solid #f1c40f; }
        .success { color: #2ecc71; border: 1px solid #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .error { color: #e74c3c; border: 1px solid #e74c3c; background: rgba(231, 76, 60, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2>Badge Finder</h2>
    <p style="color: #888; font-size: 12px;">Scanning for: 2124500831</p>
    <input type="number" id="userId" placeholder="Enter Roblox User ID">
    <button id="mainBtn" onclick="startScan()">Verify All History</button>
    <div id="status">Ready.</div>
</div>

<script>
    async function startScan() {
        const userId = document.getElementById('userId').value;
        const targetId = "2124500831";
        const status = document.getElementById('status');
        const btn = document.getElementById('mainBtn');

        if (!userId) { alert("Please enter a User ID"); return; }

        btn.disabled = true;
        status.className = "loading";
        status.innerHTML = "Connecting to Roblox...";

        let cursor = "";
        let found = false;
        let page = 1;

        try {
            while (true) {
                status.innerHTML = `Searching page ${page}...`;
                
                // Using a different proxy endpoint that is more stable for 2026
                const response = await fetch(`https://badges.roproxy.com/v1/users/${userId}/badges?limit=100&cursor=${cursor}`);
                
                if (!response.ok) {
                    throw new Error("Proxy Blocked or ID Invalid");
                }

                const json = await response.json();
                
                if (!json.data || json.data.length === 0) {
                    break; 
                }

                found = json.data.some(b => b.id.toString() === targetId);
                if (found) break;

                cursor = json.nextPageCursor;
                if (!cursor) break;
                
                page++;
                if (page > 20) break; // Safety cap (checks first 2000 badges)
            }

            if (found) {
                status.className = "success";
                status.innerHTML = "✅ BADGE FOUND!<br>Verified in full history.";
            } else {
                status.className = "error";
                status.innerHTML = "❌ NOT FOUND<br>Check if Inventory is 'Public'.";
            }
        } catch (err) {
            status.className = "error";
            status.innerHTML = "⚠️ ERROR: " + err.message + "<br>Try turning off VPN or AdBlock.";
        }
        btn.disabled = false;
    }
</script>

</body>
</html>
